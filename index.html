<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reproductor BETYZAIN</title>

<style>
body{
  margin:0;
  background:transparent;
  font-family:Arial, sans-serif;
}

.player{
  max-width:720px;
  margin:auto;
  padding:28px;
  background:white;
  border-radius:24px;
  box-shadow:0 12px 30px rgba(0,0,0,.12);
}

.wrap{
  display:flex;
  align-items:center;
  gap:26px;
}

.speaker{
  width:92px;
  height:92px;
  background:#69B9E9;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-shrink:0;
}

.label{
  color:#69B9E9;
  font-size:16px;
  font-weight:700;
}

.title{
  font-size:34px;
  font-weight:700;
  color:#333;
  margin:4px 0 20px;
}

.bar{
  display:flex;
  align-items:center;
  gap:12px;
  font-size:17px;
}

input[type=range]{
  width:100%;
  accent-color:#69B9E9;
}

.controls{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:48px;
  margin-top:26px;
}

button{
  border:none;
  background:none;
  cursor:pointer;
  color:#69B9E9;
  font-size:32px;
}

.play{
  width:72px;
  height:72px;
  border-radius:50%;
  background:#69B9E9;
  color:white;
  font-size:34px;
}

@media(max-width:600px){
  .wrap{
    flex-direction:column;
    text-align:center;
  }
  .title{
    font-size:26px;
  }
}
</style>
</head>

<body>

<div class="player">
  <div class="wrap">

    <div class="speaker">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="white">
        <path d="M3 9v6h4l5 4V5L7 9H3z"/>
        <path d="M15.5 8.5a5 5 0 010 7" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"/>
        <path d="M18 6a8 8 0 010 12" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </div>

    <div style="flex:1;">
      <div class="label">Escucha mi mensaje</div>
      <div class="title">Mensaje de bienvenida</div>

      <audio id="audio">
        <source src="https://res.cloudinary.com/z5vgtrud/video/upload/v1783171308/mensaje-bienvenida-bety_xs4ii3.mp3" type="audio/mpeg">
      </audio>

      <div class="bar">
        <span id="current">0:00</span>
        <input id="progress" type="range" min="0" value="0">
        <span id="duration">0:00</span>
      </div>

      <div class="controls">
        <button onclick="back()">⏮</button>
        <button class="play" id="play" onclick="toggle()">▶</button>
        <button onclick="forward()">⏭</button>
      </div>
    </div>

  </div>
</div>

<script>
const audio = document.getElementById("audio");
const play = document.getElementById("play");
const progress = document.getElementById("progress");
const current = document.getElementById("current");
const duration = document.getElementById("duration");

function formatTime(time){
  const minutes = Math.floor(time / 60);
  const seconds = Math.floor(time % 60);
  return minutes + ":" + (seconds < 10 ? "0" : "") + seconds;
}

audio.addEventListener("loadedmetadata", () => {
  progress.max = audio.duration;
  duration.textContent = formatTime(audio.duration);
});

audio.addEventListener("timeupdate", () => {
  progress.value = audio.currentTime;
  current.textContent = formatTime(audio.currentTime);
});

progress.addEventListener("input", () => {
  audio.currentTime = progress.value;
});

function toggle(){
  if(audio.paused){
    audio.play();
    play.textContent = "❚❚";
  }else{
    audio.pause();
    play.textContent = "▶";
  }
}

function back(){
  audio.currentTime = Math.max(0, audio.currentTime - 10);
}

function forward(){
  audio.currentTime = Math.min(audio.duration, audio.currentTime + 10);
}

audio.addEventListener("ended", () => {
  play.textContent = "▶";
});
</script>

</body>
</html>
